<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b" />
      <stop offset="100%" style="stop-color:#0f172a" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="0" dy="10" />
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  <circle cx="400" cy="112" r="60" fill="#3b82f6" opacity="0.2" />
  <g filter="url(#shadow)">
    <text x="256" y="320" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="220" text-anchor="middle" fill="url(#goldGrad)" style="letter-spacing:-10px;">DM</text>
    <text x="256" y="380" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="40" text-anchor="middle" fill="#3b82f6" style="letter-spacing:10px; opacity:0.8;">MAX</text>
  </g>
  <rect width="512" height="256" rx="100" fill="#ffffff" opacity="0.03"/>
</svg>
